version: '3.8'

services:
  healtheye:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./Models:/app/Models
      - ./Dataset_models:/app/Dataset_models
    container_name: healtheye-app
    restart: unless-stopped
